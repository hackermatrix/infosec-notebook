<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Log Management Quiz — Chapters 2 & 3</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f0d;--sf:#111916;--sf2:#182019;--bd:#2a3630;--tx:#d8e8df;--dm:#7a9488;--ac:#00e676;--ac2:#33eb91;--acg:rgba(0,230,118,.06);--ok:#00e676;--okb:rgba(0,230,118,.06);--no:#ff5252;--nob:rgba(255,82,82,.06);--warn:#ffab40;--warnb:rgba(255,171,64,.06);--cyan:#4dd0e1}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(0,230,118,.03),transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(77,208,225,.02),transparent 50%);pointer-events:none}
.app{max-width:760px;margin:0 auto;padding:28px 20px 70px;position:relative;z-index:1}
.hdr{text-align:center;margin-bottom:8px}
.hdr h1{font-family:'JetBrains Mono',monospace;font-size:1.6rem;color:var(--ac);letter-spacing:-1px}
.hdr p{color:var(--dm);font-size:.85rem;font-weight:500}
.hdr .tag{display:inline-block;margin-top:8px;padding:4px 12px;border-radius:6px;background:var(--acg);border:1px solid rgba(0,230,118,.15);color:var(--ac);font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700;letter-spacing:.5px}

.tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:16px 0 20px}
.tab{padding:7px 15px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sf);color:var(--dm);font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;transition:.2s}
.tab:hover{border-color:var(--ac);color:var(--ac)}.tab.on{background:var(--acg);border-color:var(--ac);color:var(--ac)}

.msel{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
.mb{padding:6px 14px;border-radius:99px;border:1.5px solid var(--bd);background:var(--sf);color:var(--dm);font-family:inherit;font-size:.74rem;font-weight:700;cursor:pointer;transition:.2s}
.mb:hover{border-color:var(--cyan);color:var(--cyan)}.mb.on{background:rgba(77,208,225,.08);border-color:var(--cyan);color:var(--cyan)}

.pbar{margin-bottom:16px}.pi{display:flex;justify-content:space-between;font-size:.76rem;color:var(--dm);font-weight:600;margin-bottom:5px}
.ptr{height:4px;background:var(--sf2);border-radius:99px;overflow:hidden}.pfl{height:100%;background:linear-gradient(90deg,var(--ac),var(--cyan));border-radius:99px;transition:width .4s}

.scr{display:flex;gap:10px;margin-bottom:18px}
.sc{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:.76rem;font-weight:700}
.sg{background:var(--okb);color:var(--ok)}.sw{background:var(--nob);color:var(--no)}.sdt{width:6px;height:6px;border-radius:50%}.sg .sdt{background:var(--ok)}.sw .sdt{background:var(--no)}

.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:26px 24px;margin-bottom:16px;animation:fu .3s}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.stag{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--dm);margin-bottom:10px}
.bg{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:3px 9px;border-radius:4px;margin-bottom:12px}
.bg.m{background:rgba(0,230,118,.08);color:var(--ac)}.bg.f{background:rgba(255,171,64,.08);color:var(--warn)}.bg.s{background:rgba(77,208,225,.08);color:var(--cyan)}

.scene{background:var(--sf2);border-left:2px solid var(--ac);border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:16px;font-size:.87rem;line-height:1.6;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:.8rem}
.slbl{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--ac);margin-bottom:5px}

.qt{font-size:1rem;font-weight:700;line-height:1.6;margin-bottom:16px}

.os{display:flex;flex-direction:column;gap:7px}
.ob{display:flex;align-items:flex-start;gap:10px;width:100%;padding:12px 14px;border-radius:9px;border:1.5px solid var(--bd);background:var(--sf2);color:var(--tx);font-family:inherit;font-size:.86rem;line-height:1.45;text-align:left;cursor:pointer;transition:.18s}

.ol{flex-shrink:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:800;background:rgba(255,255,255,.04);color:var(--dm);transition:.18s}
.ob.sc{border-color:var(--ok);background:var(--okb)}.ob.sc .ol{background:var(--ok);color:var(--bg)}

.ob.rc{border-color:var(--ok);border-style:dashed}.ob.rc .ol{background:var(--ok);color:var(--bg)}

.si{width:100%;padding:13px 14px;border-radius:9px;border:1.5px solid var(--bd);background:var(--sf2);color:var(--tx);font-family:inherit;font-size:.88rem;line-height:1.5;resize:vertical;min-height:90px;outline:none;transition:.2s}.si:focus{border-color:var(--ac)}.si:disabled{opacity:.5}

.br{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.bn{padding:10px 22px;border-radius:9px;border:none;font-family:inherit;font-size:.83rem;font-weight:700;cursor:pointer;transition:.18s}
.bp{background:var(--ac);color:var(--bg)}.bp:hover{background:var(--ac2)}.bp:disabled{opacity:.35}
.bs{background:var(--sf2);color:var(--tx);border:1.5px solid var(--bd)}.bs:hover{border-color:var(--ac)}

.ex{margin-top:14px;padding:14px 16px;border-radius:10px;font-size:.84rem;line-height:1.65;color:var(--dm);animation:fu .3s}.ex strong{color:var(--tx)}
.ex.oke{background:rgba(0,230,118,.04);border-left:3px solid var(--ok)}
.ex.noe{background:rgba(255,82,82,.04);border-left:3px solid var(--no)}

.rcard{text-align:center;padding:40px 26px}
.rcard h2{font-family:'JetBrains Mono',monospace;font-size:1.4rem;color:var(--tx)}
.big{font-size:3.8rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--ac);margin:12px 0;line-height:1}
.rd{color:var(--dm);font-size:.88rem;margin-bottom:24px;line-height:1.7}
.ri{text-align:left;padding:14px 0;border-bottom:1px solid var(--bd)}.ri:last-child{border:0}
.rq{font-weight:700;font-size:.85rem;margin-bottom:4px}.ra{font-size:.8rem;color:var(--dm);line-height:1.5}
.ra .g{color:var(--ok);font-weight:700}.ra .r{color:var(--no);font-weight:700}

@media(max-width:500px){.hdr h1{font-size:1.3rem}.card{padding:20px 16px}.qt{font-size:.93rem}}

<body>
<div class="app" id="app"></div>
<script>
const Q=[
// ===== CH 2.1 — Basics =====
{s:"2.1",cat:"app",sc:"A security analyst investigating a breach finds a firewall log showing a connection was allowed from a suspicious IP at 3:15:22 PM. The IDS log shows an attack signature from the same IP at 3:22:08 PM. The server's event log shows a failed admin login at 3:15:22 PM. However, the analyst later discovers that the server's clock was 7 minutes ahead of the firewall's clock.",q:"What fundamental log management requirement was violated, and why does it matter?",t:"mcq",o:["Log encryption — the logs should have been encrypted","NTP time synchronization — without synchronized clocks, the analyst cannot reliably correlate events across systems, making the 7-minute gap impossible to interpret","Log rotation — the logs should have been rotated more frequently","Log normalization — the formats were different"],a:1,e:"Without NTP synchronization, the 3:15:22 firewall event and the 3:15:22 server event may or may not be the same moment in time. The 7-minute clock skew makes cross-system correlation unreliable — the analyst can't tell if the server login attempt and the firewall connection are the same event or two different ones. NTP is a CRITICAL foundation for log management."},

{s:"2.1",cat:"app",sc:"A company monitors only its firewall logs. An insider with legitimate VPN access steals customer data by running unauthorized database queries during normal business hours.",q:"Why did the company's log monitoring FAIL to detect this insider threat?",t:"mcq",o:["The firewall was misconfigured","Firewall logs only show network connections — they don't capture application-level activity like database queries; the company needed to also monitor database logs, application logs, and DLP systems","The insider used encryption to hide the theft","Firewalls can't generate logs during business hours"],a:1,e:"This illustrates why logs from MULTIPLE sources are needed. Firewalls see network traffic (allow/deny) but not what happens inside applications. The insider had legitimate network access (VPN), so firewall logs showed normal traffic. Only database logs would show the unauthorized queries, and DLP logs would detect the data exfiltration. Defense requires correlating security software, OS, AND application logs."},

{s:"2.1",cat:"trick",q:"A system administrator is investigating an incident and finds that the attacker's first action after gaining access was to clear all logs on the compromised server. The admin concludes there is no evidence of the attack.",t:"mcq",o:["Correct — if the logs are cleared, there's no evidence available anywhere","Incorrect — the ACT of clearing logs is itself evidence of compromise, and if logs were forwarded to a central syslog server in real-time, copies exist there","Incorrect — but only if the server had antivirus installed","Correct — attackers who clear logs are automatically exonerated"],a:1,e:"TWO traps here: (1) Log clearing IS evidence — a gap in logs where entries should exist is itself suspicious and indicative of compromise. (2) If the organization uses centralized logging (syslog server, SIEM), the logs were forwarded in real-time before the attacker cleared local copies. This is exactly WHY centralized log collection exists — to protect against local log tampering."},

{s:"2.1",cat:"app",q:"An organization needs to prove in court that an employee accessed confidential files. They present server access logs as evidence. The opposing attorney argues the logs are inadmissible because there's no proof they haven't been tampered with.",t:"mcq",o:["Logs are always admissible in court regardless of integrity","The attorney is correct — without integrity protection (cryptographic hash chains, WORM storage, chain of custody documentation), the logs may be inadmissible because there's no proof of non-tampering","Logs from Windows servers are automatically trusted by courts","The attorney can't challenge digital evidence"],a:1,e:"For logs to serve as LEGAL EVIDENCE, you must demonstrate integrity: cryptographic hash chains prove entries weren't modified, WORM (Write Once Read Many) storage prevents alteration, and chain of custody documents who accessed the logs and when. Without these, opposing counsel can argue the logs were fabricated or altered, potentially making them inadmissible."},

// ===== CH 2.2-2.3 — Need & Challenges =====
{s:"2.2",cat:"app",sc:"A hospital's security team receives 2.4 million log events per day from firewalls, servers, and medical devices. Analysts review logs manually by reading through text files. They consistently miss critical alerts because they can't process the volume.",q:"This scenario illustrates which specific log management challenge?",t:"mcq",o:["Log generation is too low","Alert fatigue and volume overload — manual review of millions of events is humanly impossible; automated analysis (SIEM) is required to detect meaningful patterns in massive datasets","The logs are using the wrong format","NTP is misconfigured"],a:1,e:"At 2.4 million events/day, manual review means each analyst would need to review roughly 100,000 events per 8-hour shift — about 3.5 events per second. Impossible. This is why SIEM correlation engines, automated alerting, and log filtering are essential. Human analysts should focus on the alerts SIEM generates, not raw log files."},

{s:"2.3",cat:"trick",q:"Traditional syslog (RFC 3164) over UDP is a secure and reliable method for transporting logs to a central server.",t:"tf",a:false,e:"DOUBLE trap: Traditional syslog over UDP is NEITHER secure NOR reliable. (1) UDP is connectionless — no delivery confirmation, packets can be lost silently. (2) No encryption — log messages travel in plaintext, readable by anyone on the network. (3) No authentication — anyone can send fake syslog messages. Secure logging requires: TCP (reliable delivery), TLS encryption (confidentiality + integrity), and mutual certificate authentication. Use RFC 5424 + TLS on port 6514."},

{s:"2.3",cat:"app",sc:"A company's PCI-DSS audit is next month. The auditor will require evidence that all access to cardholder data was logged and that logs are retained for at least one year with three months readily accessible. The company discovers their log retention is set to 30 days.",q:"What is the compliance gap, and what should the company do?",t:"short",m:"The company is significantly non-compliant. PCI-DSS Requirement 10 mandates: (1) Log ALL access to network resources and cardholder data, (2) Retain logs for at LEAST 1 year, (3) Have at least 3 months of logs readily accessible for analysis. With only 30-day retention, they're missing 11 months of required retention. Immediate actions: extend retention to 1+ year, implement tiered storage (recent logs on fast storage, older logs on archive), ensure cardholder data access is being logged on all relevant systems, and prepare evidence of the corrected policy for the auditor."},

{s:"2.3",cat:"app",q:"An attacker compromises a web server and modifies the local access logs to remove evidence of their intrusion. The server's logs are the ONLY copy.",t:"mcq",o:["This is unavoidable — there's no way to protect against log tampering","This is a failure to implement centralized logging — logs should be forwarded in real-time to a remote, secured log server so the attacker cannot destroy the only copy","The admin should have used stronger passwords","The firewall should have blocked the attacker"],a:1,e:"If the local log is the only copy, it's a single point of failure. Centralized logging sends logs to a hardened remote server in real-time — before an attacker can tamper with them. Even if the attacker clears local logs, the SIEM/syslog server has the originals. This is one of the PRIMARY reasons centralized log management exists."},

// ===== CH 2.4 — Meeting Challenges =====
{s:"2.4",cat:"app",sc:"Three different systems log the same failed login attempt:\n• Windows: 'Event ID 4625: Account failed to log on. Account: admin'\n• Linux: 'Failed password for admin from 192.168.1.50 port 22'\n• Firewall: 'DENY src=192.168.1.50 dst=10.0.0.1 service=SSH'",q:"What log management function is needed to make these three entries searchable and correlatable as ONE event?",t:"mcq",o:["Log encryption","Log normalization — converting different formats into a common schema so they can be analyzed together","Log deletion","Log compression"],a:1,e:"All three entries describe the SAME event (failed admin login from 192.168.1.50) but in completely different formats. Normalization converts all three into a common schema with standardized fields (timestamp, source_ip, target_user, action, result), enabling the SIEM to recognize them as related and correlate them into a single security event."},

// ===== CH 3.1-3.2 — Architecture & Functions =====
{s:"3.1",cat:"app",sc:"A company has 500 servers across 3 data centers and 20 remote offices. They need to decide between installing log collection agents on every server versus using agentless syslog forwarding.",q:"What is the key trade-off between agent-based and agentless log collection?",t:"mcq",o:["There is no difference between the two approaches","Agents provide richer, more detailed data and work better with non-syslog sources (Windows), but require deployment and management on every system; agentless (syslog) is lighter but may miss some data and works best with Linux/Unix/network devices","Agents are always cheaper","Agentless is always more reliable"],a:1,e:"Agent-based: install software on each server → richer data, better Windows/application support, filtering at source, but 500 agents to deploy and maintain. Agentless: use native syslog → no software to manage, but less detailed, limited Windows support (Windows doesn't natively use syslog), may miss application-specific events. Most enterprises use a HYBRID: agents on key servers, syslog for network devices."},

{s:"3.2",cat:"trick",q:"A SIEM's correlation engine generates an alert saying 'Possible data exfiltration: 5 events correlated.' An analyst dismisses it because each individual event looked harmless. The next day, a data breach is confirmed.",t:"mcq",o:["The SIEM was misconfigured — each event was harmless, so the alert was a false positive","The analyst made an error — SIEM correlation detects patterns across events that are individually harmless but collectively indicate an attack; dismissing correlated alerts based on individual event assessment defeats the purpose of correlation","The SIEM should only alert on single high-severity events","Correlation engines always produce false positives and should be ignored"],a:1,e:"This is the ENTIRE POINT of SIEM correlation. Individual events (firewall allow, unusual query, data transfer) may each be benign alone. The correlation engine's job is to connect them: suspicious IP → SQL injection attempt → database query → data transfer = attack chain. If analysts evaluate correlated alerts by looking at each event in isolation, they're undoing the SIEM's work. Correlated alerts must be evaluated AS A PATTERN."},

// ===== CH 3.3 — Syslog =====
{s:"3.3",cat:"trick",q:"Syslog severity level 0 (Emergency) is LESS severe than level 7 (Debug).",t:"tf",a:false,e:"TRAP: The numbering is counterintuitive. In syslog, LOWER numbers = HIGHER severity. 0 = Emergency (most severe — system is unusable), 7 = Debug (least severe — verbose debugging info). Remember: 0 is the MOST critical. Mnemonic: 'Every Alert Counts Even When Nobody Is Debugging' (Emergency=0, Alert=1, Critical=2, Error=3, Warning=4, Notice=5, Informational=6, Debug=7)."},

{s:"3.3",cat:"app",q:"A syslog message has PRI value 34. Given that PRI = (Facility × 8) + Severity, and Facility 4 = 'auth', what is the Facility and Severity?",t:"mcq",o:["Facility 4 (auth), Severity 2 (Critical) — because 4×8=32, 34-32=2","Facility 34, Severity 0","Facility 2, Severity 4","Facility 3, Severity 4"],a:0,e:"PRI = (Facility × 8) + Severity. To decode PRI 34: Facility = 34 ÷ 8 = 4 (integer division), remainder = 34 - (4×8) = 34 - 32 = 2. So Facility = 4 (auth/security), Severity = 2 (Critical). This means: a CRITICAL authentication/security event. Being able to decode PRI values is a practical syslog skill."},

{s:"3.3",cat:"app",sc:"A company uses traditional syslog (UDP port 514, no encryption) to forward logs from all servers to a central syslog server. An attacker on the network is able to: (1) read all log messages in plaintext, (2) inject fake log entries, and (3) some legitimate logs never arrive.",q:"Identify each vulnerability and the correct mitigation for each.",t:"short",m:"Three vulnerabilities: (1) PLAINTEXT transport — logs readable on network → Mitigation: TLS encryption (RFC 5425, port 6514). (2) NO AUTHENTICATION — anyone can send fake syslog messages → Mitigation: Mutual TLS certificate authentication so only authorized sources can send logs. (3) UDP is UNRELIABLE — no delivery confirmation, packets silently lost → Mitigation: Switch to TCP or RELP (Reliable Event Logging Protocol) for guaranteed delivery. The comprehensive fix: migrate from UDP/514 to TLS-encrypted TCP syslog on port 6514 with mutual certificate authentication and consider RELP for guaranteed delivery."},

{s:"3.3",cat:"trick",q:"RFC 5424 (modern syslog) and RFC 3164 (BSD syslog) are identical standards.",t:"tf",a:false,e:"RFC 3164 is the LEGACY BSD syslog format — it was never an official standard (it was an 'informational' RFC documenting existing practice). It has limited metadata, no structured data, and inconsistent timestamp formats. RFC 5424 is the MODERN standard: it adds structured data elements, standardized timestamp format (ISO 8601), UTF-8 support, and better message formatting. Always use RFC 5424 for new deployments."},

// ===== CH 3.4 — SIEM =====
{s:"3.4",cat:"app",sc:"A company deploys a SIEM and imports the default correlation rules without customization. Within the first week, analysts receive 15,000 alerts per day, 98% of which are false positives. The team starts ignoring all alerts.",q:"What went wrong, and what should the company have done?",t:"mcq",o:["The SIEM is defective and should be returned","The company failed to TUNE the SIEM — default rules generate excessive false positives because they aren't customized to the organization's environment; proper deployment requires baselining normal activity and progressively tuning rules to reduce noise","SIEMs always produce 15,000 alerts; this is normal","The company should have bought a more expensive SIEM"],a:1,e:"SIEM tuning is CRITICAL and often underestimated. Default rules are generic — they don't know what's 'normal' in YOUR environment. Deployment requires: (1) Baseline normal behavior first, (2) Start with a small set of high-confidence rules, (3) Progressively tune thresholds to reduce false positives, (4) Whitelist known-good activity, (5) Continuously refine based on analyst feedback. An untuned SIEM is worse than no SIEM — it creates alert fatigue that causes real threats to be ignored."},

{s:"3.4",cat:"app",sc:"A SIEM correlates these events within 8 minutes from the same source IP:\n1. Port scan detected (IDS)\n2. SQL injection attempt on web app (WAF)\n3. Web server returns HTTP 500 error (web server log)\n4. Unusual SELECT * query on user table (database log)\n5. 2GB outbound transfer to external IP (netflow/firewall)",q:"What attack chain does this correlation reveal?",t:"mcq",o:["A routine database backup","A denial-of-service attack","A complete SQL injection attack with data exfiltration — reconnaissance (port scan) → exploitation (SQL injection) → compromise (server error + unauthorized query) → exfiltration (large outbound transfer)","A normal user downloading a large file"],a:2,e:"This is a textbook example of why SIEM correlation is powerful. Each event ALONE could be benign (port scans happen, 500 errors happen, data transfers happen). But correlated in sequence from the SAME SOURCE IP within 8 minutes, the pattern is unmistakable: reconnaissance → exploit → access → steal data. No single log source would reveal the full attack — only correlation across IDS, WAF, web server, database, and network logs reveals it."},

{s:"3.4",cat:"trick",q:"SIEM stands for Security Information and Event Management. It combines which two previously separate functions?",t:"mcq",o:["SaaS and IaaS","SIM (Security Information Management — storage, analysis, reporting) and SEM (Security Event Management — real-time monitoring, correlation, alerting)","SMTP and IMAP","SSL and SSH"],a:1,e:"SIEM = SIM + SEM. SIM handles the 'data' side: long-term storage, historical analysis, compliance reporting. SEM handles the 'real-time' side: live monitoring, event correlation, alerting. Modern SIEMs combine both into a single platform. Don't confuse SIEM with other acronyms — it specifically combines information management with event management."},

{s:"3.4",cat:"app",q:"A company uses a SIEM for compliance reporting but has NO ONE actively monitoring the real-time alerts. All alerts are reviewed weekly in a batch report.",t:"mcq",o:["This is acceptable — weekly review is sufficient for most organizations","This defeats half the SIEM's purpose — SEM (real-time correlation and alerting) is wasted if no one monitors alerts in real-time; an attack could progress for days before the weekly review catches it","Weekly is more efficient than real-time monitoring","SIEMs aren't designed for real-time monitoring"],a:1,e:"SIEM provides both real-time AND historical capabilities. Using it only for weekly compliance reports ignores the real-time correlation and alerting (SEM) that detects attacks in progress. If an attacker breaches the network on Monday and no one looks at alerts until Friday, they have 5 days to move laterally, exfiltrate data, and cause damage. Real-time monitoring (or at minimum, daily review) is essential."},

// ===== CH 3.5 — Additional Tools =====
{s:"3.5",cat:"app",sc:"After a SIEM generates a critical alert about a ransomware infection, the security team must: disable the user's account, isolate three infected machines, block the attacker's IP on the firewall, send notification emails to management, and create an incident ticket — all within 15 minutes.",q:"Which type of tool can AUTOMATE this multi-step response workflow?",t:"mcq",o:["A log forwarder (Fluentd)","An antivirus scanner","SOAR (Security Orchestration, Automation, and Response) — it automates incident response workflows by executing predefined playbooks that coordinate actions across multiple security tools","A network forensics tool (Wireshark)"],a:2,e:"SOAR takes the baton from SIEM: the SIEM detects and alerts, and the SOAR automates the response. A SOAR playbook can automatically disable accounts, quarantine machines, update firewall rules, send notifications, and create tickets — all within seconds, consistently, and without human delay. Examples: Palo Alto XSOAR, Splunk SOAR, IBM Resilient."},

// ===== Cross-chapter =====
{s:"2-3",cat:"app",q:"Rank the following log management steps in the correct operational order: Analysis, Collection, Alerting, Normalization, Generation, Storage.",t:"mcq",o:["Analysis → Collection → Generation → Storage → Normalization → Alerting","Generation → Collection → Normalization → Storage → Analysis → Alerting","Alerting → Analysis → Generation → Collection → Storage → Normalization","Storage → Generation → Collection → Normalization → Alerting → Analysis"],a:1,e:"The correct log management pipeline: (1) GENERATION — systems create events. (2) COLLECTION — logs gathered from sources. (3) NORMALIZATION — converted to common format. (4) STORAGE — persisted for retention. (5) ANALYSIS — patterns and anomalies identified. (6) ALERTING — notifications generated when rules match. Each step depends on the previous one — you can't normalize what you haven't collected, and you can't analyze what hasn't been normalized."},

{s:"2-3",cat:"short",sc:"You are the new security engineer at a mid-size company. Currently, each server stores its own logs locally, there's no central log server, logs aren't backed up, clocks are not synchronized, retention is inconsistent (some servers keep 7 days, others 90 days), and nobody reviews logs.",q:"Design a log management improvement plan. Identify at least 5 specific problems and propose a solution for each.",m:"Problems and solutions: (1) NO CENTRALIZATION — logs on individual servers can be tampered with and can't be correlated → Deploy centralized syslog server or SIEM to aggregate all logs. (2) NO BACKUP — logs are lost if a server fails → Implement log archival with redundant storage. (3) NO TIME SYNC — can't correlate events across systems → Deploy NTP and require all systems to synchronize to the same time source. (4) INCONSISTENT RETENTION — some servers at 7 days won't meet any compliance requirement → Establish a uniform retention policy based on regulatory requirements (e.g., 1 year for PCI-DSS). (5) NO REVIEW — threats go undetected → Implement automated alerting via SIEM correlation rules and assign staff to monitor alerts. (6) NO INTEGRITY PROTECTION — logs can be tampered with → Use TLS for transport, WORM storage or hash chains for integrity. (7) NO POLICY — everything is ad-hoc → Create a formal log management policy defining what to log, how long to retain, who can access, and review procedures."},
];

let mode="all",qs=[],ci=0,sc2=0,wr2=0,ans=false,ua=[];
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b}
function init(){let p=Q;if(mode==="mcq")p=Q.filter(x=>x.t==="mcq");else if(mode==="tf")p=Q.filter(x=>x.t==="tf");else if(mode==="short")p=Q.filter(x=>x.t==="short");qs=shuf(p);ci=0;sc2=0;wr2=0;ans=false;ua=[];}
function cntT(t){return Q.filter(x=>x.t===t).length}
function render(){
const a=document.getElementById('app');if(!qs.length)init();if(ci>=qs.length){renderR();return;}
const q=qs[ci],pct=Math.round(ci/qs.length*100);
let bc=q.t==="mcq"?"m":q.t==="tf"?"f":"s",bl=q.t==="mcq"?"MCQ":q.t==="tf"?"TRUE/FALSE":"SHORT ANSWER";
let catl=q.cat==="trick"?"🪤 TRICK":"📋 SCENARIO";
let scn=q.sc?`<div class="slbl">${catl}</div><div class="scene">${q.sc}</div>`:`<div class="slbl">${catl}</div>`;
let bd='';
if(q.t==="mcq"){const L=['A','B','C','D'];bd='<div class="os">'+q.o.map((x,i)=>`<button class="ob" data-i="${i}" onclick="sMCQ(${i})"><span class="ol">${L[i]}</span><span>${x}</span></button>`).join('')+'</div>';}
else if(q.t==="tf"){bd='<div class="os"><button class="ob" data-v="true" onclick="sTF(true)"><span class="ol">T</span><span>True</span></button><button class="ob" data-v="false" onclick="sTF(false)"><span class="ol">F</span><span>False</span></button></div>';}
else{bd=`<textarea class="si" id="sa" placeholder="Type your answer here..."></textarea><div class="br"><button class="bn bp" onclick="rSh()">Show Model Answer</button></div>`;}
a.innerHTML=`
<div class="hdr"><h1>> Log Management Quiz_</h1><p>Chapters 2 & 3 — Application & Trick Questions</p><div class="tag">NIST SP 800-92 CONCEPTS</div></div>
<div class="msel"><button class="mb ${mode==='all'?'on':''}" onclick="sM('all')">All (${Q.length})</button><button class="mb ${mode==='mcq'?'on':''}" onclick="sM('mcq')">MCQ (${cntT('mcq')})</button><button class="mb ${mode==='tf'?'on':''}" onclick="sM('tf')">T/F (${cntT('tf')})</button><button class="mb ${mode==='short'?'on':''}" onclick="sM('short')">Short (${cntT('short')})</button></div>
<div class="pbar"><div class="pi"><span>Q ${ci+1}/${qs.length}</span><span>${pct}%</span></div><div class="ptr"><div class="pfl" style="width:${pct}%"></div></div></div>
<div class="scr"><div class="sc sg"><span class="sdt"></span>${sc2}</div><div class="sc sw"><span class="sdt"></span>${wr2}</div></div>
<div class="card"><div class="stag">Section ${q.s}</div><span class="bg ${bc}">${bl}</span>${scn}<div class="qt">${q.q}</div>${bd}<div id="ex"></div><div id="nr"></div></div>`;
}
function showEx(q,ok){document.getElementById('ex').innerHTML=`<div class="ex ${ok?'oke':'noe'}"><strong style="color:${ok?'var(--ok)':'var(--no)'};">${ok?'✓ Correct':'✗ Incorrect'}</strong><br>${q.e}</div>`;document.getElementById('nr').innerHTML='<div class="br"><button class="bn bp" onclick="nxt()">Next →</button></div>';}
window.sMCQ=function(i){if(ans)return;ans=true;const q=qs[ci],bs=document.querySelectorAll('.ob');bs.forEach(b=>b.disabled=true);const ok=i===q.a;ok?sc2++:wr2++;bs[i].classList.add(ok?'sc':'sw2');if(!ok)bs[q.a].classList.add('rc');ua.push({q:q.q,t:'mcq',ok,u:q.o[i],c:q.o[q.a]});showEx(q,ok);};
window.sTF=function(v){if(ans)return;ans=true;const q=qs[ci],bs=document.querySelectorAll('.ob');bs.forEach(b=>b.disabled=true);const ok=v===q.a;ok?sc2++:wr2++;bs.forEach(b=>{const bv=b.getAttribute('data-v')==='true';if(bv===v)b.classList.add(ok?'sc':'sw2');if(bv===q.a&&!ok)b.classList.add('rc');});ua.push({q:q.q,t:'tf',ok,u:v?'True':'False',c:q.a?'True':'False'});showEx(q,ok);};
window.rSh=function(){if(ans)return;ans=true;const q=qs[ci],ta=document.getElementById('sa');ta.disabled=true;const ut=ta.value.trim()||'(no answer)';ua.push({q:q.q,t:'short',u:ut,md:q.m});document.getElementById('ex').innerHTML=`<div class="ex oke"><strong style="color:var(--cyan)">📝 Model Answer</strong><br>${q.m}</div>`;document.getElementById('nr').innerHTML='<div class="br"><button class="bn bp" style="background:var(--ok)" onclick="sg(true)">Got it ✓</button><button class="bn bs" style="border-color:var(--no);color:var(--no)" onclick="sg(false)">Missed it ✗</button></div>';};
window.sg=function(ok){ok?sc2++:wr2++;ua[ua.length-1].ok=ok;document.getElementById('nr').innerHTML='<div class="br"><button class="bn bp" onclick="nxt()">Next →</button></div>';};
window.nxt=function(){ci++;ans=false;render();};
window.sM=function(m){mode=m;init();render();};
function renderR(){const tot=qs.length,pct=Math.round(sc2/tot*100);let g=pct>=90?'🏆 Log Master!':pct>=70?'📊 Solid Analyst':pct>=50?'📚 Review Needed':'🔍 Study More';
let rv=ua.map((a,i)=>{if(a.t==='short'){const mk=a.ok?'<span class="g">✓</span>':'<span class="r">✗</span>';return `<div class="ri"><div class="rq">${i+1}. ${a.q.substring(0,100)}...</div><div class="ra">${mk}<br><b>You:</b> ${a.u}<br><b>Model:</b> ${a.md}</div></div>`;}const mk=a.ok?`<span class="g">✓ ${a.u}</span>`:`<span class="r">✗ ${a.u}</span> → <span class="g">${a.c}</span>`;return `<div class="ri"><div class="rq">${i+1}. ${a.q.substring(0,100)}...</div><div class="ra">${mk}</div></div>`;}).join('');
document.getElementById('app').innerHTML=`<div class="hdr"><h1>> Results_</h1><p>Chapters 2 & 3 Log Management</p></div><div class="card rcard"><h2>${g}</h2><div class="big">${pct}%</div><div class="rd"><span style="color:var(--ok)">● ${sc2} correct</span>&nbsp;&nbsp;<span style="color:var(--no)">● ${wr2} wrong</span>&nbsp;&nbsp;of ${tot}</div><div class="br" style="justify-content:center"><button class="bn bp" onclick="sM('${mode}')">🔄 Retry</button><button class="bn bs" onclick="sM('all')">All Q's</button></div></div><div class="card" style="padding:18px 22px"><h3 style="margin-bottom:10px;font-size:.95rem">Review</h3>${rv}</div>`;}
init();render();
</script>
</body>
</html>
