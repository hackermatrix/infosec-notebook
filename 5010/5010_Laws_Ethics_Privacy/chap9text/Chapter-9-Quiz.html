<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 9 — Privacy Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0e14;--surface:#13161f;--surface2:#1a1e2a;--border:#252a38;
  --text:#dfe1e8;--dim:#7c8097;--accent:#e8915a;--accent-g:rgba(232,145,90,.12);
  --ok:#34d399;--ok-bg:rgba(52,211,153,.08);--no:#fb7185;--no-bg:rgba(251,113,133,.08);
  --gold:#facc15;--purple:#a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(232,145,90,.04),transparent 60%),radial-gradient(ellipse at 80% 90%,rgba(167,139,250,.03),transparent 60%);pointer-events:none;z-index:0}
.app{max-width:740px;margin:0 auto;padding:24px 18px 64px;position:relative;z-index:1}
.hdr{text-align:center;margin-bottom:32px}
.hdr h1{font-family:'Playfair Display',serif;font-size:2rem;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.hdr p{color:var(--dim);font-size:.9rem}
.tabs{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.tab{padding:8px 18px;border-radius:99px;border:1.5px solid var(--border);background:var(--surface);color:var(--dim);font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:.2s}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.on{background:var(--accent-g);border-color:var(--accent);color:var(--accent)}
.pbar{margin-bottom:22px}.pinfo{display:flex;justify-content:space-between;font-size:.8rem;color:var(--dim);margin-bottom:6px}
.ptrack{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:99px;transition:width .4s}
.chips{display:flex;gap:10px;margin-bottom:22px}
.chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;font-size:.78rem;font-weight:600}
.chip.cg{background:var(--ok-bg);color:var(--ok)}.chip.cw{background:var(--no-bg);color:var(--no)}
.dot{width:6px;height:6px;border-radius:50%}.chip.cg .dot{background:var(--ok)}.chip.cw .dot{background:var(--no)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px 24px;margin-bottom:18px;animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.badge{display:inline-block;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:3px 9px;border-radius:5px;margin-bottom:12px}
.badge.mcq{background:rgba(232,145,90,.12);color:var(--accent)}.badge.tf{background:rgba(250,204,21,.12);color:var(--gold)}.badge.short{background:rgba(167,139,250,.12);color:var(--purple)}
.stag{font-size:.7rem;color:var(--dim);margin-bottom:8px}
.qtxt{font-size:1.05rem;font-weight:600;line-height:1.55;margin-bottom:20px}
.opts{display:flex;flex-direction:column;gap:9px}
.ob{display:flex;align-items:flex-start;gap:11px;width:100%;padding:13px 15px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:.91rem;line-height:1.45;text-align:left;cursor:pointer;transition:.18s}
.ob:hover:not(:disabled){border-color:var(--accent);background:var(--accent-g)}.ob:disabled{cursor:default}
.ol{flex-shrink:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:.76rem;font-weight:700;background:rgba(255,255,255,.05);color:var(--dim);transition:.18s}
.ob.sc{border-color:var(--ok);background:var(--ok-bg)}.ob.sc .ol{background:var(--ok);color:var(--bg)}
.ob.sw{border-color:var(--no);background:var(--no-bg)}.ob.sw .ol{background:var(--no);color:var(--bg)}
.ob.rc{border-color:var(--ok)}.ob.rc .ol{background:var(--ok);color:var(--bg)}
.si{width:100%;padding:13px 15px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:.93rem;line-height:1.5;resize:vertical;min-height:88px;outline:none;transition:.2s}
.si:focus{border-color:var(--accent)}.si:disabled{opacity:.5}
.br{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap}
.btn{padding:10px 22px;border-radius:9px;border:none;font-family:inherit;font-size:.86rem;font-weight:600;cursor:pointer;transition:.18s}
.bp{background:var(--accent);color:var(--bg)}.bp:hover{filter:brightness(1.1)}.bp:disabled{opacity:.35;cursor:default}
.bs{background:var(--surface2);color:var(--text);border:1.5px solid var(--border)}.bs:hover{border-color:var(--accent)}
.ex{margin-top:16px;padding:14px 16px;border-radius:10px;background:rgba(232,145,90,.05);border-left:3px solid var(--accent);font-size:.86rem;line-height:1.6;color:var(--dim);animation:fu .3s}
.ex strong{color:var(--text)}
.rcard{text-align:center;padding:40px 28px}
.rcard h2{font-family:'Playfair Display',serif;font-size:1.7rem;margin-bottom:6px}
.big{font-size:3.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:14px 0;line-height:1}
.rd{color:var(--dim);font-size:.9rem;margin-bottom:26px;line-height:1.7}
.ri{text-align:left;padding:16px 0;border-bottom:1px solid var(--border)}.ri:last-child{border:0}
.rq{font-weight:600;font-size:.9rem;margin-bottom:5px}
.ra{font-size:.83rem;color:var(--dim);line-height:1.5}
.ra .g{color:var(--ok)}.ra .r{color:var(--no)}
@media(max-width:500px){.hdr h1{font-size:1.5rem}.card{padding:20px 16px}.qtxt{font-size:.98rem}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const Q=[
// ===== 9.1 Privacy Concepts =====
{s:"9.1 Privacy Concepts",t:"mcq",q:"Which of the following BEST describes Personally Identifiable Information (PII)?",o:["Only a person's full legal name","Any data that can identify a specific individual, including name, SSN, email, IP address, or biometrics","Only data stored in government databases","Information that has been anonymized and aggregated"],a:1,e:"PII encompasses any data that can be used alone or combined with other information to identify a specific individual. This includes names, SSNs, email addresses, IP addresses, biometrics, and more."},
{s:"9.1 Privacy Concepts",t:"mcq",q:"The practice of using data collected for one purpose for an entirely different purpose without the individual's consent is called:",o:["Data aggregation","Secondary use","Data minimization","Data portability"],a:1,e:"Secondary use occurs when data collected for a stated purpose is repurposed for something entirely different without consent. This violates the principle of purpose limitation found in most privacy frameworks."},
{s:"9.1 Privacy Concepts",t:"mcq",q:"Why is true data anonymization extremely difficult to achieve?",o:["It requires expensive software","Government regulations prohibit it","Quasi-identifiers (ZIP code + birthdate + gender) can be combined to re-identify individuals","Anonymous data cannot be stored digitally"],a:2,e:"Research shows that combining seemingly innocuous data points (quasi-identifiers) like ZIP code, birthdate, and gender can uniquely identify most people. Simply removing names is insufficient for true anonymization."},
{s:"9.1 Privacy Concepts",t:"tf",q:"Privacy is an absolute right that can never be limited under any circumstances.",a:false,e:"Privacy exists on a spectrum balanced against security needs, public interest, commercial interests, and social norms. Law enforcement, public health emergencies, and national security sometimes require access to private information."},
{s:"9.1 Privacy Concepts",t:"tf",q:"Data persistence — the fact that digital data can exist forever — is one of the computer-related privacy problems.",a:true,e:"Unlike paper records that degrade over time, digital data can persist indefinitely. Combined with near-zero storage costs, organizations keep data forever, creating long-term privacy risks."},
{s:"9.1 Privacy Concepts",t:"short",q:"Explain the difference between a 'data controller' and a 'data processor' in privacy terminology.",m:"A data controller is the entity that decides how and why personal data is processed — they determine the purposes and means of processing. A data processor is the entity that processes data on behalf of the controller. For example, a hospital (controller) decides to store patient records, and the cloud hosting company (processor) stores that data as instructed."},

// ===== 9.2 Privacy Principles and Policies =====
{s:"9.2 Privacy Principles & Policies",t:"mcq",q:"Which of the following is NOT one of the Fair Information Practice Principles (FIPPs)?",o:["Notice / Awareness","Choice / Consent","Monetization / Profit","Enforcement / Redress"],a:2,e:"The five FIPPs are: Notice/Awareness, Choice/Consent, Access/Participation, Integrity/Security, and Enforcement/Redress. Monetization is not a privacy principle — it's often in conflict with privacy."},
{s:"9.2 Privacy Principles & Policies",t:"mcq",q:"Under GDPR, what is the maximum fine for serious violations?",o:["$1 million","€10 million or 2% of global revenue","€20 million or 4% of global annual revenue, whichever is greater","Criminal imprisonment only"],a:2,e:"GDPR imposes fines of up to €20 million or 4% of global annual revenue (whichever is greater) for the most serious violations. This extraterritorial regulation applies to any organization processing EU residents' data."},
{s:"9.2 Privacy Principles & Policies",t:"mcq",q:"Which U.S. law specifically protects the privacy of children under 13 online?",o:["HIPAA","FERPA","COPPA","GLBA"],a:2,e:"COPPA (Children's Online Privacy Protection Act, 1998) requires parental consent before collecting data from children under 13 and mandates privacy policies on children's websites."},
{s:"9.2 Privacy Principles & Policies",t:"mcq",q:"How does the U.S. approach to privacy law differ from the EU's approach?",o:["The U.S. has stricter laws than the EU","The U.S. uses a sectoral approach with separate laws, while the EU has a comprehensive single regulation (GDPR)","There is no difference — both use identical frameworks","The U.S. relies entirely on the GDPR"],a:1,e:"The U.S. has a patchwork of sector-specific laws (HIPAA for health, COPPA for children, GLBA for finance, etc.) with no single comprehensive federal privacy law. The EU has the GDPR as one unified comprehensive regulation."},
{s:"9.2 Privacy Principles & Policies",t:"mcq",q:"What type of identity theft involves combining real and fabricated information to create a new fake identity?",o:["Financial identity theft","Medical identity theft","Synthetic identity theft","Criminal identity theft"],a:2,e:"Synthetic identity theft combines real information (like a legitimate SSN) with fabricated details (fake name, address) to create an entirely new identity. It's especially difficult to detect."},
{s:"9.2 Privacy Principles & Policies",t:"tf",q:"The EU generally requires opt-in consent for data collection, while the U.S. generally relies on opt-out models.",a:true,e:"The EU (through GDPR) requires explicit opt-in consent — data is not collected unless the individual agrees. The U.S. generally defaults to opt-out — data is collected unless the individual explicitly objects. This is a fundamental philosophical difference."},
{s:"9.2 Privacy Principles & Policies",t:"tf",q:"HIPAA protects the privacy of student educational records.",a:false,e:"HIPAA (Health Insurance Portability and Accountability Act) protects health information (PHI). FERPA (Family Educational Rights and Privacy Act) is the law that protects student education records."},
{s:"9.2 Privacy Principles & Policies",t:"tf",q:"The GDPR applies only to companies physically located within the European Union.",a:false,e:"GDPR has extraterritorial reach — it applies to ANY organization processing EU residents' data, regardless of where the organization is located. A U.S. company serving EU customers must comply with GDPR."},
{s:"9.2 Privacy Principles & Policies",t:"short",q:"List the five Fair Information Practice Principles (FIPPs) and briefly explain each.",m:"1) Notice/Awareness — inform individuals about data collection before it happens. 2) Choice/Consent — let individuals decide whether data is collected (opt-in/opt-out). 3) Access/Participation — allow individuals to view and correct their data. 4) Integrity/Security — ensure data is accurate and protected from unauthorized access. 5) Enforcement/Redress — provide mechanisms to enforce principles and remedy violations."},
{s:"9.2 Privacy Principles & Policies",t:"short",q:"Explain the GDPR's 'Right to Be Forgotten' (Right to Erasure).",m:"The Right to Be Forgotten (Article 17 of GDPR) allows individuals to request the deletion of their personal data from an organization's records. Organizations must comply when the data is no longer necessary for its original purpose, consent has been withdrawn, or the data was unlawfully processed. There are exceptions for legal obligations, public interest, and freedom of expression."},

// ===== 9.3 Authentication and Privacy =====
{s:"9.3 Authentication & Privacy",t:"mcq",q:"Which of the following is an example of 'something you are' (inherence factor) in authentication?",o:["A password","A smart card","A fingerprint scan","A one-time code sent by SMS"],a:2,e:"The three authentication factors are: Something you know (password/PIN), Something you have (smart card/token/phone), and Something you are (biometrics — fingerprint, iris scan, facial recognition)."},
{s:"9.3 Authentication & Privacy",t:"mcq",q:"What is the PRIMARY privacy concern with biometric authentication?",o:["Biometrics are too easy to guess","Biometric data is permanent — if compromised, it cannot be changed like a password","Biometric scanners are too expensive","Biometrics only work in daylight"],a:1,e:"Unlike passwords that can be reset, biometric data (fingerprints, iris patterns, facial structure) is permanent. If a biometric database is breached, the damage is irreversible — you can't get new fingerprints."},
{s:"9.3 Authentication & Privacy",t:"mcq",q:"A zero-knowledge proof allows you to:",o:["Share your password securely over email","Prove you know something without revealing what you know","Delete all your data from a server","Track someone's location anonymously"],a:1,e:"Zero-knowledge proofs are a cryptographic technique where one party can prove to another that they know a piece of information without revealing the information itself. This enables authentication without excessive identity disclosure."},
{s:"9.3 Authentication & Privacy",t:"tf",q:"Authentication and privacy always work together harmoniously — stronger authentication always improves privacy.",a:false,e:"Authentication and privacy are in fundamental tension. Stronger authentication means more identification and tracking, which reduces anonymity. The key is proportional authentication — request only the level of identity verification appropriate for the sensitivity of the transaction."},
{s:"9.3 Authentication & Privacy",t:"short",q:"Explain the tension between authentication and privacy.",m:"Authentication requires verifying identity, which creates records linking activities to specific individuals. This conflicts with privacy's goal of controlling information and maintaining anonymity. More authentication means more tracking, profiling, and surveillance capability. However, authentication also supports privacy by ensuring only authorized individuals access sensitive data and by creating accountability for data access."},

// ===== 9.4 Data Mining =====
{s:"9.4 Data Mining",t:"mcq",q:"What does k-anonymity ensure in a privacy-preserving dataset?",o:["Each record is encrypted with a k-bit key","Each record is indistinguishable from at least k-1 other records","Only k people can access the database","Data is deleted after k days"],a:1,e:"k-Anonymity ensures that for every record in a dataset, there are at least k-1 other records with identical quasi-identifiers (like ZIP code, age, gender). This makes it harder to single out any individual."},
{s:"9.4 Data Mining",t:"mcq",q:"Differential privacy protects individual privacy by:",o:["Encrypting the entire database","Adding calibrated random noise to query results","Deleting personal records after analysis","Requiring fingerprint authentication to access data"],a:1,e:"Differential privacy adds mathematically calibrated noise to query results, providing a formal guarantee that the output is essentially the same whether or not any single individual's data is included. It uses a privacy parameter epsilon (ε) — smaller ε means more privacy."},
{s:"9.4 Data Mining",t:"mcq",q:"A major concern with government data mining programs is:",o:["They are too expensive to operate","They produce false positives that flag innocent people as suspicious","They only work during business hours","They cannot process large datasets"],a:1,e:"Government data mining for threats involves bulk analysis of millions of innocent people's data. The inherent false positive rate means many innocent people are wrongly flagged, potentially leading to investigation, watch lists, or detention with little recourse."},
{s:"9.4 Data Mining",t:"tf",q:"Function creep refers to systems built for one purpose being gradually expanded to serve entirely different purposes.",a:true,e:"Function creep is a major privacy concern with government data mining. Systems built for counter-terrorism may expand to drug enforcement, immigration, or tax fraud — often without the privacy safeguards that were promised for the original purpose."},
{s:"9.4 Data Mining",t:"tf",q:"Differential privacy is the mathematical gold standard for privacy-preserving data analysis, used by Apple, Google, and the U.S. Census Bureau.",a:true,e:"Differential privacy provides a formal mathematical guarantee of privacy protection. It has been adopted by major tech companies and government agencies as the standard for analyzing sensitive data while protecting individuals."},
{s:"9.4 Data Mining",t:"short",q:"Explain the utility-privacy trade-off in privacy-preserving data mining.",m:"There is an inherent trade-off between data utility and privacy protection. Maximum privacy (e.g., heavy noise or full anonymization) reduces the accuracy and usefulness of analysis results. Maximum utility (full access to raw data) provides no privacy protection. Privacy-preserving techniques like differential privacy use parameters (like epsilon) to tune this balance — smaller epsilon gives more privacy but less accurate results."},

// ===== 9.5 Privacy on the Web =====
{s:"9.5 Privacy on the Web",t:"mcq",q:"Browser fingerprinting is a privacy concern because it can:",o:["Only track users who accept cookies","Identify users without cookies by collecting unique browser configuration details","Only work on mobile devices","Be easily blocked by clearing cookies"],a:1,e:"Browser fingerprinting collects your unique combination of browser type, version, plugins, screen resolution, installed fonts, timezone, and other settings. This combination is often unique enough to identify you without any cookies — and it's extremely difficult to block."},
{s:"9.5 Privacy on the Web",t:"mcq",q:"Which of the following provides the STRONGEST anonymity for web browsing?",o:["Incognito/private browsing mode","A standard VPN","The Tor Browser","Clearing cookies after each session"],a:2,e:"Tor (The Onion Router) routes traffic through multiple encrypted relays, making it extremely difficult to trace back to the user. VPNs hide your IP from websites but your VPN provider sees everything. Incognito mode only hides browsing from the local device — not from ISPs or websites."},
{s:"9.5 Privacy on the Web",t:"mcq",q:"What type of spyware records every keystroke a user makes?",o:["Adware","Browser hijacker","Keylogger","Tracking cookie"],a:2,e:"Keyloggers record every keystroke, capturing passwords, messages, searches, credit card numbers, and everything else typed. They are the most dangerous type of spyware because they can capture virtually all sensitive input."},
{s:"9.5 Privacy on the Web",t:"mcq",q:"Third-party cookies are a privacy concern because they:",o:["Slow down your browser significantly","Allow advertisers to track your browsing across multiple different websites","Are required by law","Only work on government websites"],a:1,e:"Third-party cookies are placed by domains other than the one you're visiting (typically ad networks). They allow advertisers to track your browsing behavior across thousands of different websites, building a comprehensive profile of your interests and activities."},
{s:"9.5 Privacy on the Web",t:"tf",q:"Incognito / private browsing mode prevents your ISP and employer from seeing your web activity.",a:false,e:"Incognito mode only prevents local storage of browsing history, cookies, and form data. Your ISP, employer network administrator, and the websites you visit can still see your traffic. For network-level privacy, you need a VPN or Tor."},
{s:"9.5 Privacy on the Web",t:"tf",q:"HTTPS ensures that a website is trustworthy and legitimate.",a:false,e:"HTTPS ensures data is encrypted in transit between your browser and the server — it protects confidentiality and integrity of the communication. However, HTTPS does NOT guarantee the site is legitimate — phishing sites can (and do) use HTTPS. You must still verify the site's identity independently."},
{s:"9.5 Privacy on the Web",t:"short",q:"Explain the difference between a VPN and Tor for web privacy.",m:"A VPN encrypts your traffic and routes it through a single server, hiding your IP from websites and your ISP. However, the VPN provider can see all your traffic, creating a single point of trust. Tor routes traffic through multiple encrypted relays (at least 3), so no single node knows both the source and destination. Tor provides stronger anonymity but is slower. A VPN is faster and easier to use but requires trusting the provider."},

// ===== 9.6 Email Security =====
{s:"9.6 Email Security",t:"mcq",q:"The common analogy used to describe default email security is that email is like a:",o:["Sealed letter in an envelope","Postcard — anyone along the path can read it","Locked safe","Classified document"],a:1,e:"Email is frequently compared to a postcard because, without encryption, anyone along the delivery path (mail servers, network administrators, ISPs) can potentially read its contents. Encryption turns the postcard into a sealed, locked envelope."},
{s:"9.6 Email Security",t:"mcq",q:"Which three technologies work together to combat email spoofing?",o:["SSL, SSH, and VPN","HTTP, FTP, and SMTP","SPF, DKIM, and DMARC","AES, RSA, and DES"],a:2,e:"SPF (Sender Policy Framework) specifies authorized sending servers, DKIM (DomainKeys Identified Mail) adds digital signatures, and DMARC (Domain-based Message Authentication) builds on both to tell receivers what to do with failed authentication. Together they combat email spoofing."},
{s:"9.6 Email Security",t:"mcq",q:"The CAN-SPAM Act regulates commercial email in the U.S. by:",o:["Requiring opt-in consent before sending commercial email","Banning all marketing emails","Requiring an opt-out mechanism but NOT requiring opt-in consent","Applying only to government agencies"],a:2,e:"CAN-SPAM requires commercial emails to include an opt-out mechanism, accurate header information, and a physical address. However, it does NOT require opt-in consent — companies can send unsolicited commercial emails as long as they provide opt-out capability."},
{s:"9.6 Email Security",t:"mcq",q:"What is the key difference between TLS encryption and PGP/S-MIME for email?",o:["TLS is free while PGP costs money","TLS encrypts in transit only; PGP/S-MIME provide end-to-end encryption","PGP only works on Windows","TLS is newer and always better"],a:1,e:"TLS encrypts email while it travels between servers (in transit), but emails are stored unencrypted on the servers. PGP and S-MIME provide end-to-end encryption — the email is encrypted on the sender's device and only decrypted on the recipient's device. The email provider cannot read end-to-end encrypted messages."},
{s:"9.6 Email Security",t:"tf",q:"Employers in most jurisdictions are legally permitted to read employees' work email.",a:true,e:"Company email is generally considered company property. In most jurisdictions, employers have the legal right to monitor work email, and employees have little to no expectation of privacy when using work email systems."},
{s:"9.6 Email Security",t:"tf",q:"Email metadata (who, when, how often) is relatively harmless compared to email content.",a:false,e:"Email metadata is extremely revealing. It exposes social networks, communication patterns, relationships, habits, and timing — even without reading the content. Intelligence agencies consider metadata extremely valuable for analysis and pattern detection."},
{s:"9.6 Email Security",t:"short",q:"Describe the three types of anonymous remailers (Type I, II, and III) and how they differ.",m:"Type I (Cypherpunk) remailers simply strip identifying headers and forward the email — basic anonymity but vulnerable to traffic analysis. Type II (Mixmaster) adds latency and mixes messages from many users to prevent traffic analysis — stronger protection. Type III (Mixminion) improves on Mixmaster by adding reply capability and improved mixing algorithms — the most sophisticated, allowing anonymous two-way communication."},

// ===== 9.7 Emerging Technologies =====
{s:"9.7 Emerging Technologies",t:"mcq",q:"What is the primary privacy defense against unwanted RFID scanning?",o:["Formatting the RFID chip","Using a Faraday sleeve or cage that blocks radio signals","Installing antivirus software","Changing the RFID password"],a:1,e:"Faraday sleeves/cages block electromagnetic signals, preventing RFID readers from communicating with tags. Other defenses include kill commands (permanently disabling tags) and encryption on the tags themselves."},
{s:"9.7 Emerging Technologies",t:"mcq",q:"For electronic voting systems, which feature is essential to ensure votes can be audited?",o:["Internet connectivity","Voter-Verified Paper Audit Trail (VVPAT)","Facial recognition of voters","Cloud storage of votes"],a:1,e:"VVPAT provides a physical paper record that voters can verify before casting their ballot. This paper trail enables recounts and audits that are impossible with purely electronic systems that leave no physical record."},
{s:"9.7 Emerging Technologies",t:"mcq",q:"The main privacy concern with cloud computing is:",o:["Cloud services are too slow","Data may be stored in any country and subject to that country's laws, while providers can technically access your data","Cloud services don't support encryption","Only governments can use cloud services"],a:1,e:"Cloud data may reside in data centers across multiple countries, each with different privacy laws. Providers have technical access to your data, can be compelled by government orders, and jurisdictional conflicts (like EU data on U.S. servers) create complex legal challenges."},
{s:"9.7 Emerging Technologies",t:"mcq",q:"Which U.S. law requires some VoIP providers to build in wiretapping capability for law enforcement?",o:["HIPAA","COPPA","CALEA (Communications Assistance for Law Enforcement Act)","CAN-SPAM"],a:2,e:"CALEA requires telecommunications carriers, including some VoIP providers, to build technical capabilities that allow law enforcement to conduct electronic surveillance. This conflicts with the privacy advantages of encrypted VoIP."},
{s:"9.7 Emerging Technologies",t:"tf",q:"Passive RFID tags have their own battery and can transmit signals over 100 meters.",a:false,e:"Passive RFID tags have NO battery — they are powered by the reader's electromagnetic signal and have a range of up to about 10 meters. Active RFID tags have their own battery and can transmit over 100+ meters."},
{s:"9.7 Emerging Technologies",t:"tf",q:"Client-side encryption before uploading to the cloud is the strongest protection for cloud data privacy.",a:true,e:"If you encrypt data before it leaves your device (client-side encryption), the cloud provider cannot read your data even if compelled by law enforcement. The provider only stores encrypted data they cannot decrypt. This is the strongest cloud privacy measure."},
{s:"9.7 Emerging Technologies",t:"short",q:"Explain why internet voting poses significant privacy and security challenges compared to in-person voting.",m:"Internet voting faces multiple challenges: 1) Authentication is difficult — verifying voter identity remotely without enabling vote-buying. 2) Voter's device may be compromised by malware that could alter votes. 3) Man-in-the-middle attacks on the communication channel. 4) Coercion is easier — someone can watch the voter at home. 5) No physical paper trail for auditing. 6) Server-side attacks could alter results at scale. In-person voting with paper ballots provides ballot secrecy, physical verification, and auditable paper trails."},

// ===== 9.8-9.9 Future & Comprehensive =====
{s:"9.8 Future & Comprehensive",t:"mcq",q:"Which privacy-enhancing technology allows AI models to be trained on data distributed across many devices WITHOUT centralizing it?",o:["Homomorphic encryption","Federated learning","k-Anonymity","VPN tunneling"],a:1,e:"Federated learning trains models locally on each device and only shares model updates (not raw data) with a central server. This allows collaborative AI training without any individual's raw data ever leaving their device."},
{s:"9.8 Future & Comprehensive",t:"mcq",q:"Under which U.S. law must federal agencies conduct Privacy Impact Assessments (PIAs) before deploying systems that collect PII?",o:["COPPA","USA PATRIOT Act","E-Government Act of 2002","CAN-SPAM Act"],a:2,e:"The E-Government Act of 2002 mandates that federal agencies conduct Privacy Impact Assessments before developing or procuring IT systems that collect, maintain, or disseminate personally identifiable information."},
{s:"9.8 Future & Comprehensive",t:"mcq",q:"Which of the following GDPR rights allows individuals to receive their personal data in a portable, machine-readable format?",o:["Right to Erasure","Right to Object","Right to Data Portability","Right to Rectification"],a:2,e:"The Right to Data Portability (Article 20) allows individuals to receive their personal data in a structured, commonly used, machine-readable format and transmit it to another data controller. This promotes competition and user control."},
{s:"9.8 Future & Comprehensive",t:"tf",q:"The concept of 'Privacy by Design' means building privacy protections into systems from the beginning, rather than adding them after problems are discovered.",a:true,e:"Privacy by Design is a framework that advocates for privacy to be embedded into the design and architecture of IT systems and business practices from the start, not bolted on as an afterthought. It is now required by GDPR."},
{s:"9.8 Future & Comprehensive",t:"tf",q:"A credit freeze prevents new accounts from being opened in your name and is a key defense against identity theft.",a:true,e:"A credit freeze (also called a security freeze) restricts access to your credit report, making it very difficult for identity thieves to open new accounts in your name. It is free to place and lift, and is one of the most effective defenses against identity theft."},
{s:"9.8 Future & Comprehensive",t:"short",q:"Compare the U.S. sectoral approach to privacy law with the EU's comprehensive approach (GDPR). Give one advantage and one disadvantage of each.",m:"U.S. Sectoral Approach — Advantage: Allows tailored rules for specific industries (healthcare, finance, children), accommodating unique sector needs. Disadvantage: Creates gaps where entire categories of data have no federal protection, and the patchwork is confusing for businesses to navigate. EU Comprehensive Approach (GDPR) — Advantage: Provides uniform, consistent protection for all personal data regardless of sector, eliminating gaps. Disadvantage: Can be overly broad, imposing the same requirements on small businesses and large corporations alike, and may be slower to adapt to sector-specific nuances."},
];

let mode="all",qs=[],ci=0,sc=0,wr=0,ans=false,ua=[];
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b}
function init(){let f=Q;if(mode==="mcq")f=Q.filter(x=>x.t==="mcq");else if(mode==="tf")f=Q.filter(x=>x.t==="tf");else if(mode==="short")f=Q.filter(x=>x.t==="short");qs=shuf(f);ci=0;sc=0;wr=0;ans=false;ua=[];}
function render(){
const a=document.getElementById('app');if(!qs.length)init();if(ci>=qs.length){renderR();return;}
const q=qs[ci],pct=Math.round(ci/qs.length*100);
let bc=q.t==="mcq"?"mcq":q.t==="tf"?"tf":"short",bl=q.t==="mcq"?"Multiple Choice":q.t==="tf"?"True / False":"Short Answer";
let bd='';
if(q.t==="mcq"){const L=['A','B','C','D'];bd='<div class="opts">'+q.o.map((x,i)=>`<button class="ob" data-i="${i}" onclick="sMCQ(${i})"><span class="ol">${L[i]}</span><span>${x}</span></button>`).join('')+'</div>';}
else if(q.t==="tf"){bd='<div class="opts"><button class="ob" data-v="true" onclick="sTF(true)"><span class="ol">T</span><span>True</span></button><button class="ob" data-v="false" onclick="sTF(false)"><span class="ol">F</span><span>False</span></button></div>';}
else{bd='<textarea class="si" id="sa" placeholder="Type your answer here..."></textarea><div class="br"><button class="btn bp" onclick="rSh()">Show Model Answer</button></div>';}
a.innerHTML=`<div class="hdr"><h1>Chapter 9 Quiz</h1><p>Privacy</p></div>
<div class="tabs"><button class="tab ${mode==='all'?'on':''}" onclick="sM('all')">All (${Q.length})</button><button class="tab ${mode==='mcq'?'on':''}" onclick="sM('mcq')">MCQs (${Q.filter(x=>x.t==='mcq').length})</button><button class="tab ${mode==='tf'?'on':''}" onclick="sM('tf')">True/False (${Q.filter(x=>x.t==='tf').length})</button><button class="tab ${mode==='short'?'on':''}" onclick="sM('short')">Short Answer (${Q.filter(x=>x.t==='short').length})</button></div>
<div class="pbar"><div class="pinfo"><span>Question ${ci+1} of ${qs.length}</span><span>${pct}%</span></div><div class="ptrack"><div class="pfill" style="width:${pct}%"></div></div></div>
<div class="chips"><div class="chip cg"><span class="dot"></span>${sc} Correct</div><div class="chip cw"><span class="dot"></span>${wr} Wrong</div></div>
<div class="card" id="qc"><div class="stag">${q.s}</div><span class="badge ${bc}">${bl}</span><div class="qtxt">${q.q}</div>${bd}<div id="ex"></div><div id="nr"></div></div>`;
}
function showEx(q,ok){const ic=ok?'✓':'✗',cl=ok?'var(--ok)':'var(--no)',lb=ok?'Correct!':'Incorrect';
document.getElementById('ex').innerHTML=`<div class="ex"><strong style="color:${cl}">${ic} ${lb}</strong><br>${q.e}</div>`;
document.getElementById('nr').innerHTML='<div class="br"><button class="btn bp" onclick="nxt()">Next Question →</button></div>';}
window.sMCQ=function(i){if(ans)return;ans=true;const q=qs[ci],bs=document.querySelectorAll('.ob');bs.forEach(b=>b.disabled=true);const ok=i===q.a;ok?sc++:wr++;bs[i].classList.add(ok?'sc':'sw');if(!ok)bs[q.a].classList.add('rc');ua.push({q:q.q,t:'mcq',ok,u:q.o[i],c:q.o[q.a]});showEx(q,ok);};
window.sTF=function(v){if(ans)return;ans=true;const q=qs[ci],bs=document.querySelectorAll('.ob');bs.forEach(b=>b.disabled=true);const ok=v===q.a;ok?sc++:wr++;bs.forEach(b=>{const bv=b.getAttribute('data-v')==='true';if(bv===v)b.classList.add(ok?'sc':'sw');if(bv===q.a&&!ok)b.classList.add('rc');});ua.push({q:q.q,t:'tf',ok,u:v?'True':'False',c:q.a?'True':'False'});showEx(q,ok);};
window.rSh=function(){if(ans)return;ans=true;const q=qs[ci],ta=document.getElementById('sa');ta.disabled=true;const ut=ta.value.trim()||'(no answer)';ua.push({q:q.q,t:'short',u:ut,md:q.m});
document.getElementById('ex').innerHTML=`<div class="ex"><strong style="color:var(--accent)">📝 Model Answer</strong><br>${q.m}</div>`;
document.getElementById('nr').innerHTML='<div class="br"><button class="btn bp" style="background:var(--ok);color:#000" onclick="sg(true)">I got it right ✓</button><button class="btn bs" style="border-color:var(--no);color:var(--no)" onclick="sg(false)">I got it wrong ✗</button></div>';};
window.sg=function(ok){ok?sc++:wr++;ua[ua.length-1].ok=ok;document.getElementById('nr').innerHTML='<div class="br"><button class="btn bp" onclick="nxt()">Next Question →</button></div>';};
window.nxt=function(){ci++;ans=false;render();};
window.sM=function(m){mode=m;init();render();};
function renderR(){const tot=qs.length,pct=Math.round(sc/tot*100);let g=pct>=90?'🏆 Excellent!':pct>=70?'👏 Good Job!':pct>=50?'📚 Keep Studying':'💪 Try Again';
let rv=ua.map((a,i)=>{if(a.t==='short'){const mk=a.ok?'<span class="g">✓ Self-marked correct</span>':'<span class="r">✗ Self-marked incorrect</span>';return `<div class="ri"><div class="rq">${i+1}. ${a.q}</div><div class="ra">${mk}<br><strong>Your answer:</strong> ${a.u}<br><strong>Model:</strong> ${a.md}</div></div>`;}
const mk=a.ok?`<span class="g">✓ ${a.u}</span>`:`<span class="r">✗ ${a.u}</span> → <span class="g">${a.c}</span>`;return `<div class="ri"><div class="rq">${i+1}. ${a.q}</div><div class="ra">${mk}</div></div>`;}).join('');
document.getElementById('app').innerHTML=`<div class="hdr"><h1>Chapter 9 Quiz</h1><p>Privacy</p></div>
<div class="card rcard"><h2>${g}</h2><div class="big">${pct}%</div><div class="rd">You got <strong style="color:var(--ok)">${sc}</strong> out of <strong>${tot}</strong> correct<br><span style="color:var(--ok)">● ${sc} correct</span>&nbsp;&nbsp;<span style="color:var(--no)">● ${wr} wrong</span></div><div class="br" style="justify-content:center"><button class="btn bp" onclick="sM('${mode}')">🔄 Retry Quiz</button><button class="btn bs" onclick="sM('all')">📋 All Questions</button></div></div>
<div class="card" style="padding:18px 22px"><h3 style="margin-bottom:10px;font-size:1rem">📝 Review Answers</h3>${rv}</div>`;}
init();render();
</script>
</body>
</html>
