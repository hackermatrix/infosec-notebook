<script>
const Q=[
// 11.1 Protecting Programs and Data
{s:"11.1 Protecting Programs & Data",t:"mcq",q:"Copyright protects the _____ of a work, while patents protect the _____.",o:["idea; expression","expression; invention (idea/method)","hardware; software","trade secret; public information"],a:1,e:"Copyright protects the specific expression (the actual code you write), not the underlying idea. Patents protect inventions — novel methods, algorithms, and processes. This is the fundamental distinction between the two."},
{s:"11.1 Protecting Programs & Data",t:"mcq",q:"Which intellectual property protection lasts potentially forever but is lost immediately if the information becomes public?",o:["Copyright","Patent","Trade secret","Trademark"],a:2,e:"Trade secrets have no expiration date — they last as long as the secret is maintained. However, unlike copyrights and patents, trade secret protection is lost immediately if the information becomes publicly known through any means."},
{s:"11.1 Protecting Programs & Data",t:"mcq",q:"The Digital Millennium Copyright Act (DMCA) criminalizes:",o:["Using open-source software","Circumventing technical copyright protection measures (DRM)","Filing patent applications","Registering domain names"],a:1,e:"The DMCA criminalizes circumventing technological measures that control access to copyrighted works (DRM), even if the underlying use would otherwise be lawful (like fair use). This has been controversial for creating tension with fair use rights."},
{s:"11.1 Protecting Programs & Data",t:"mcq",q:"Which of the following is TRUE about copyright protection for software?",o:["Registration is required before protection exists","It protects the underlying algorithm","It exists automatically upon creation in a fixed form","It lasts only 20 years"],a:2,e:"Copyright protection is automatic — it exists the moment a work is created in a fixed, tangible form. No registration is required (though registration strengthens legal position). Copyright does NOT protect algorithms (patents do that) and lasts life + 70 years."},
{s:"11.1 Protecting Programs & Data",t:"tf",q:"If you independently write code that is identical to someone else's copyrighted code, you have NOT committed copyright infringement.",a:true,e:"Copyright has an independent creation defense. If you independently create code that happens to be identical to copyrighted code — without copying — you have not infringed copyright. Patents, however, do NOT have this defense — independent invention still infringes a patent."},
{s:"11.1 Protecting Programs & Data",t:"tf",q:"A patent requires public disclosure of the invention, while a trade secret requires secrecy.",a:true,e:"Patents require the inventor to publicly disclose how the invention works (in exchange for 20 years of protection). Trade secrets are the opposite — protection depends on keeping the information secret. This is a key strategic choice for IP holders."},
{s:"11.1 Protecting Programs & Data",t:"short",q:"Compare copyright, patent, and trade secret protection for software. Include what each protects, duration, and one key advantage.",m:"Copyright protects the specific code (expression), lasts life + 70 years, and is automatic/free. Patent protects the algorithm/invention, lasts 20 years, and prevents even independent re-creation. Trade secret protects confidential business information, lasts potentially forever, and requires no registration or disclosure. Key choice: copyright is automatic but doesn't protect ideas; patents are strong but expensive and require disclosure; trade secrets are free but lost if disclosed."},

// 11.2 Information and the Law
{s:"11.2 Information & the Law",t:"mcq",q:"Why does traditional property law have difficulty with information theft?",o:["Information is always free","Copying information doesn't deprive the owner of their copy — it's non-depleting","All information is public domain","Courts refuse to hear information cases"],a:1,e:"When you steal a physical object, the owner no longer has it. When you copy information, the owner still has their copy. This 'non-depleting' nature makes traditional theft concepts awkward to apply. The law has gradually adapted but the fit remains imperfect."},
{s:"11.2 Information & the Law",t:"mcq",q:"An organization fails to patch a known vulnerability that leads to a data breach. This failure could be considered:",o:["Strict liability","Negligence — failure to exercise reasonable care","A patent violation","Fair use"],a:1,e:"Negligence occurs when someone fails to exercise the care a reasonable person would in similar circumstances. Failing to patch known vulnerabilities, especially with available fixes, is increasingly viewed as negligent behavior that could lead to civil liability."},
{s:"11.2 Information & the Law",t:"tf",q:"In criminal cases, the burden of proof is 'beyond reasonable doubt,' which is higher than the civil standard of 'preponderance of evidence.'",a:true,e:"Criminal cases require proof beyond reasonable doubt (the highest standard). Civil cases only require a preponderance of evidence (more likely than not — effectively >50%). This is why some cases lose in criminal court but win in civil court."},
{s:"11.2 Information & the Law",t:"short",q:"Explain why jurisdiction is a major challenge for computer crime prosecution.",m:"Internet crimes routinely cross state and national boundaries — the attacker may be in one country, the victim in another, and the servers in a third. Different jurisdictions have different laws, and no single authority has power over the entire internet. Extradition requires treaties and cooperation. Evidence may be stored in countries that don't cooperate. This creates gaps where criminals exploit jurisdictional mismatches."},

// 11.3 Employee/Employer Rights
{s:"11.3 Employee & Employer Rights",t:"mcq",q:"Under the work-for-hire doctrine, who owns software created by an employee as part of their job duties?",o:["The employee always owns it","The employer owns it","It becomes public domain","Ownership is always 50/50"],a:1,e:"Under the work-for-hire doctrine, when an employee creates a work within the scope of their employment, the employer is considered the legal author and owns the copyright. Employment contracts typically reinforce this with invention assignment clauses."},
{s:"11.3 Employee & Employer Rights",t:"mcq",q:"Which agreement prevents an employee from working for competitors after leaving a company?",o:["Non-Disclosure Agreement (NDA)","Non-Compete Agreement","Acceptable Use Policy","End User License Agreement"],a:1,e:"Non-compete agreements restrict employees from working for competitors for a specified time and geographic area after leaving. NDAs protect confidential information. Enforceability varies widely — some states like California generally refuse to enforce non-competes."},
{s:"11.3 Employee & Employer Rights",t:"mcq",q:"An independent contractor builds a custom application for a client. Who owns the code?",o:["The client automatically owns it","The contractor owns it unless there's a written work-for-hire or assignment agreement","The government owns it","Neither party owns it"],a:1,e:"Unlike employees, independent contractors own their work by default. The client only owns it if there's an explicit written agreement assigning rights (work-for-hire agreement or IP assignment). This catches many companies by surprise."},
{s:"11.3 Employee & Employer Rights",t:"tf",q:"Employers generally have the legal right to monitor employee activities on company-owned computer systems.",a:true,e:"In most jurisdictions, employers can monitor company-owned systems including email, internet usage, and phone calls. Company email is considered company property. Best practice requires informing employees that monitoring occurs through written policies."},
{s:"11.3 Employee & Employer Rights",t:"short",q:"What security steps should an organization take when an employee leaves?",m:"Immediately revoke all access (network, email, badge, VPN, cloud accounts). Ensure return of all company property (laptops, phones, storage media, documents). Remind the employee of ongoing NDA and confidentiality obligations. Conduct an exit interview addressing security. Monitor for data exfiltration before and after departure. Consider garden leave for employees with access to highly sensitive information."},

// 11.4 Redress for Software Failures
{s:"11.4 Redress for Software Failures",t:"mcq",q:"Most commercial software EULAs disclaim warranties and sell software on what basis?",o:["Full guarantee of zero defects","'AS IS' with limited or no warranties","Strict product liability","Lifetime warranty"],a:1,e:"Most commercial software is sold 'AS IS' — EULAs disclaim all warranties (express and implied), limit liability to the purchase price, and exclude consequential damages. This makes it very difficult for consumers to seek legal redress for software failures."},
{s:"11.4 Redress for Software Failures",t:"mcq",q:"Which vulnerability disclosure model involves privately notifying the vendor, allowing time for a fix, then disclosing publicly?",o:["Full disclosure","Non-disclosure","Responsible / Coordinated disclosure","Selling to exploit brokers"],a:2,e:"Responsible/coordinated disclosure is the most widely accepted approach: notify the vendor privately, give them a reasonable timeframe to develop a patch, then disclose publicly to inform users. This balances vendor accountability with user protection."},
{s:"11.4 Redress for Software Failures",t:"tf",q:"Strict product liability is commonly applied to software just as it is to physical products.",a:false,e:"Strict liability is rarely applied to software. Courts have debated whether software is a 'product' or a 'service.' Software is typically licensed rather than sold, and its inherent complexity makes zero-defect expectations unrealistic. The industry has largely avoided strict liability standards."},
{s:"11.4 Redress for Software Failures",t:"tf",q:"Bug bounty programs offer cash rewards for responsibly reported vulnerabilities.",a:true,e:"Bug bounty programs (run by Google, Microsoft, Apple, HackerOne, Bugcrowd, etc.) pay researchers for responsibly discovering and reporting security vulnerabilities. They create a legitimate marketplace and incentive structure for vulnerability research."},
{s:"11.4 Redress for Software Failures",t:"short",q:"Describe the four vulnerability disclosure models and their trade-offs.",m:"1) Full disclosure — publish immediately; pressures quick fixes but exposes users before patches exist. 2) Responsible/coordinated disclosure — notify vendor first, allow time to fix, then publish; balances accountability and safety. 3) Non-disclosure — report only to vendor, never publish; protects users from immediate risk but vendor may never fix it. 4) Selling to exploit brokers — financial reward but vulnerability used offensively, users remain unprotected. Responsible disclosure is the most widely accepted model."},

// 11.5 Computer Crime
{s:"11.5 Computer Crime",t:"mcq",q:"Why are separate computer crime laws needed beyond traditional criminal statutes?",o:["Traditional laws are too strict","Traditional theft, trespass, and vandalism laws don't clearly cover intangible digital harm","Computer crime is not serious enough for traditional laws","All traditional laws already cover computer crime"],a:1,e:"Traditional criminal laws were designed for physical acts — stealing physical objects, trespassing on physical property. Computer crimes involve intangible information, remote access, and digital damage that don't map cleanly to these traditional concepts. Separate laws fill these gaps."},
{s:"11.5 Computer Crime",t:"mcq",q:"Which is the PRIMARY U.S. federal computer crime statute?",o:["HIPAA","Computer Fraud and Abuse Act (CFAA)","CAN-SPAM Act","Sarbanes-Oxley Act"],a:1,e:"The CFAA (18 U.S.C. § 1030) is the primary federal computer crime law. It prohibits unauthorized access, exceeding authorized access, causing damage to protected computers, fraud via computer, trafficking in passwords, and computer-related extortion."},
{s:"11.5 Computer Crime",t:"mcq",q:"Under the CFAA, a 'protected computer' is defined as:",o:["Only government computers","Only computers with firewalls","Essentially any computer connected to the internet","Only computers in data centers"],a:2,e:"The CFAA defines 'protected computer' very broadly — essentially any computer used in or affecting interstate or foreign commerce or communication. In practice, this covers virtually any internet-connected computer, making the CFAA extremely broad."},
{s:"11.5 Computer Crime",t:"mcq",q:"What is the first international treaty specifically addressing cybercrime?",o:["The Geneva Convention","The Budapest Convention on Cybercrime (2001)","The Paris Agreement","GDPR"],a:1,e:"The Budapest Convention (Convention on Cybercrime, 2001) was the first international treaty on cybercrime. It harmonizes definitions, establishes procedures for investigation, and requires cooperation between signatory countries. Over 60 countries have signed."},
{s:"11.5 Computer Crime",t:"mcq",q:"Which of the following is the BIGGEST challenge in catching computer criminals?",o:["Computer crimes don't cause real damage","Attribution — identifying who committed the crime due to anonymity tools","There are no laws against computer crime","Victims always know who attacked them"],a:1,e:"Attribution is the greatest challenge. Attackers use VPNs, Tor, proxy chains, compromised machines, spoofed identities, and encrypted communications to hide their identity. Combined with cross-border jurisdictional issues, identifying the perpetrator is extremely difficult."},
{s:"11.5 Computer Crime",t:"tf",q:"The CFAA has been criticized as overly broad, potentially criminalizing actions like violating a website's Terms of Service.",a:true,e:"The CFAA's broad language (prohibiting 'exceeding authorized access') has been criticized for potentially criminalizing minor actions like violating Terms of Service or using a work computer for personal tasks. The Aaron Swartz case highlighted these concerns."},
{s:"11.5 Computer Crime",t:"tf",q:"Many organizations choose not to report computer crimes to avoid reputational damage.",a:true,e:"Victim reluctance is a significant challenge. Organizations fear that reporting a breach or cyberattack will damage their reputation, stock price, and customer trust. This underreporting means computer crime statistics significantly undercount actual incidents."},
{s:"11.5 Computer Crime",t:"short",q:"List three reasons why computer crime is hard to prosecute.",m:"1) Jurisdiction — attacker in one country, victim in another, servers in a third; no single authority has power. 2) Technical complexity — prosecutors, judges, and juries may lack the technical understanding needed. 3) Evidence volatility — digital evidence can be easily altered, destroyed, or encrypted; strict chain-of-custody requirements. Additional factors include victim reluctance to report and difficulty getting international cooperation."},

// 11.6 Ethics
{s:"11.6 Ethical Issues",t:"mcq",q:"Which ethical framework evaluates actions based on producing the 'greatest good for the greatest number'?",o:["Deontological ethics","Virtue ethics","Consequentialism / Utilitarianism","Rights-based ethics"],a:2,e:"Consequentialism (especially Utilitarianism) judges the morality of an action solely by its outcomes — the right action produces the greatest good for the greatest number of people. This is often used in security policy decisions."},
{s:"11.6 Ethical Issues",t:"mcq",q:"Deontological ethics (Kantian ethics) holds that actions are right or wrong based on:",o:["Their consequences and outcomes","Rules, duties, and principles — regardless of consequences","The character of the person acting","Social agreements"],a:1,e:"Deontological ethics judges actions by whether they follow rules and duties, not by their outcomes. Some things are always wrong (lying, violating privacy, breaking promises) regardless of whether the outcome is positive. Kant's key principle: treat people as ends, not merely as means."},
{s:"11.6 Ethical Issues",t:"mcq",q:"According to the (ISC)² Code of Ethics, the FIRST canon that takes highest priority is:",o:["Advance and protect the profession","Provide diligent and competent service to principals","Protect society, the common good, necessary public trust, and the infrastructure","Act honorably, honestly, justly, responsibly, and legally"],a:2,e:"The (ISC)² Code of Ethics lists its canons in priority order. The first and highest priority is 'Protect society, the common good, necessary public trust, and the infrastructure.' This means societal protection comes before employer or client interests."},
{s:"11.6 Ethical Issues",t:"mcq",q:"A security professional discovers their employer is secretly selling customer data in violation of privacy policy. Ethically, this is a case of:",o:["Acceptable business practice","A whistleblowing dilemma — duty to employer vs. duty to public interest","A purely technical issue","Fair use"],a:1,e:"This is a classic whistleblowing dilemma. The professional has loyalty to their employer but also a duty to protect the public (per professional codes of ethics). Most ethical frameworks and professional codes prioritize public interest over employer loyalty when illegal or harmful activity is involved."},
{s:"11.6 Ethical Issues",t:"tf",q:"Something that is legal is always ethical, and something that is ethical is always legal.",a:false,e:"Legal ≠ Ethical. An action can be legal but unethical (exploiting a loophole to sell user data). An action can be illegal but ethical (a whistleblower exposing corporate fraud). The law sets the minimum standard; ethics aims higher and fills gaps where the law is silent."},
{s:"11.6 Ethical Issues",t:"tf",q:"Technology evolves faster than law, which is why ethics is essential for guiding behavior in emerging situations.",a:true,e:"Laws take years to draft and pass, while technology changes rapidly. Ethics provides guidance for behavior in situations where no law yet exists or where existing laws are outdated. This is why ethical reasoning skills are critical for security professionals."},
{s:"11.6 Ethical Issues",t:"short",q:"Explain the difference between consequentialism and deontological ethics. Give a security example where they might disagree.",m:"Consequentialism judges actions by their outcomes — the right action maximizes good and minimizes harm. Deontological ethics judges actions by rules and duties, regardless of outcomes. Example: unauthorized penetration testing (hacking without permission). Consequentialism might justify it if it reveals critical vulnerabilities that get fixed (good outcome). Deontological ethics would say it's wrong regardless of the outcome because unauthorized access violates rules and the person's autonomy, and the end does not justify the means."},

// 11.7 Incident Analysis
{s:"11.7 Incident Analysis",t:"mcq",q:"A security researcher breaks into a company's system without permission to find vulnerabilities, intending to report them. This is:",o:["Entirely legal because the intent was good","Illegal under the CFAA regardless of intent — good intentions don't create authorization","Legal as long as they report their findings","Protected by the First Amendment"],a:1,e:"Unauthorized access is illegal under the CFAA regardless of the researcher's good intentions. Ethical hacking requires explicit authorization. The ends do not justify the means — both legally and under deontological ethics. The proper approach is to seek permission or use responsible disclosure."},
{s:"11.7 Incident Analysis",t:"mcq",q:"In the 'salami slicing' fraud scenario where small fractions of cents are diverted, the ethical analysis shows that:",o:["It's acceptable because the amounts are too small to matter","The small scale makes it less wrong than large-scale fraud","It is clearly unethical and illegal — the scale doesn't change the moral character of theft","It's legal as long as amounts are under $1"],a:2,e:"Salami slicing is theft regardless of the amount. Every ethical framework condemns it: it violates duties of honesty (deontology), harms victims (consequentialism), violates property rights, and is incompatible with good character (virtue ethics). Scale doesn't change the moral character of fraud."},
{s:"11.7 Incident Analysis",t:"mcq",q:"When an employee leaves a company and uses general knowledge gained there to develop a competing product (without taking confidential materials), this is:",o:["Always illegal — all knowledge belongs to the employer","Legally and ethically complex — general skills belong to the employee, but trade secrets do not","Always legal — employees can do whatever they want after leaving","Protected by the DMCA"],a:1,e:"The line between general knowledge/skills (which the employee can use) and trade secrets (which belong to the employer) is blurry. Employees have the right to earn a living using their general expertise, but they cannot use confidential information or trade secrets. NDAs and non-compete agreements further complicate this."},
{s:"11.7 Incident Analysis",t:"tf",q:"The fact that you have the technical ability to access a system means you have the ethical right to do so.",a:false,e:"Having the technical ability to do something says nothing about whether you should do it. 'Can' does not imply 'should.' This is a fundamental ethical principle — capability does not create authorization. Security professionals must respect boundaries even when they could easily bypass them."},
{s:"11.7 Incident Analysis",t:"tf",q:"Professional codes of ethics (like ACM and (ISC)²) both prioritize the protection of society and public interest above all else.",a:true,e:"Both the ACM Code and the (ISC)² Code place societal protection as the highest priority. The ACM Code says 'contribute to society and human well-being' and 'avoid harm.' The (ISC)² Code's first canon is 'protect society, the common good, necessary public trust, and the infrastructure.'"},
{s:"11.7 Incident Analysis",t:"short",q:"A developer discovers their software produces slightly inaccurate financial calculations. Fixing it would delay the release. Apply two ethical frameworks to analyze this situation.",m:"Consequentialism: The right action depends on the potential harm. Small errors in a game are low-risk, but financial calculation errors could cause real monetary harm to users. If the impact could be significant, delaying the release prevents greater harm — which a utilitarian would favor. Deontological ethics: Users have a right to accurate systems, and the developer has a duty of honesty. Shipping known-inaccurate software without disclosure violates these duties regardless of cost or delay. At minimum, users should be informed of the limitation (transparency is a duty)."},
];

a.innerHTML=`<div class="hd"><h1>Chapter 11 Quiz</h1><p>Legal Issues & Ethics</p></div>
<div class="tb"><button class="t ${mode==='all'?'on':''}" onclick="sM('all')">All (${Q.length})</button><button class="t ${mode==='mcq'?'on':''}" onclick="sM('mcq')">MCQs (${Q.filter(x=>x.t==='mcq').length})</button><button class="t ${mode==='tf'?'on':''}" onclick="sM('tf')">True/False (${Q.filter(x=>x.t==='tf').length})</button><button class="t ${mode==='short'?'on':''}" onclick="sM('short')">Short Answer (${Q.filter(x=>x.t==='short').length})</button></div>
<div class="pb"><div class="pi"><span>Question ${ci+1} of ${qs.length}</span><span>${pct}%</span></div><div class="pt"><div class="pf" style="width:${pct}%"></div></div></div>
<div class="ch"><div class="cp cg"><span class="dt"></span>${sc} Correct</div><div class="cp cw"><span class="dt"></span>${wr} Wrong</div></div>
<div class="cd" id="qc"><div class="st">${q.s}</div><span class="bg ${bc}">${bl}</span><div class="qt">${q.q}</div>${bd}<div id="ex"></div><div id="nr"></div></div>`;
}
function showEx(q,ok){const ic=ok?'✓':'✗',cl=ok?'var(--ok)':'var(--no)',lb=ok?'Correct!':'Incorrect';
document.getElementById('ex').innerHTML=`<div class="ex"><strong style="color:${cl}">${ic} ${lb}</strong><br>${q.e}</div>`;
document.getElementById('nr').innerHTML='<div class="br"><button class="bn bp" onclick="nxt()">Next Question →</button></div>';}
window.sMCQ=function(i){if(ans)return;ans=true;const q=qs[ci],bs=document.querySelectorAll('.ob');bs.forEach(b=>b.disabled=true);const ok=i===q.a;ok?sc++:wr++;bs[i].classList.add(ok?'sc':'sw');if(!ok)bs[q.a].classList.add('rc');ua.push({q:q.q,t:'mcq',ok,u:q.o[i],c:q.o[q.a]});showEx(q,ok);};
window.sTF=function(v){if(ans)return;ans=true;const q=qs[ci],bs=document.querySelectorAll('.ob');bs.forEach(b=>b.disabled=true);const ok=v===q.a;ok?sc++:wr++;bs.forEach(b=>{const bv=b.getAttribute('data-v')==='true';if(bv===v)b.classList.add(ok?'sc':'sw');if(bv===q.a&&!ok)b.classList.add('rc');});ua.push({q:q.q,t:'tf',ok,u:v?'True':'False',c:q.a?'True':'False'});showEx(q,ok);};
window.rSh=function(){if(ans)return;ans=true;const q=qs[ci],ta=document.getElementById('sa');ta.disabled=true;const ut=ta.value.trim()||'(no answer)';ua.push({q:q.q,t:'short',u:ut,md:q.m});
document.getElementById('ex').innerHTML=`<div class="ex"><strong style="color:var(--ac)">📝 Model Answer</strong><br>${q.m}</div>`;
document.getElementById('nr').innerHTML='<div class="br"><button class="bn bp" style="background:var(--ok);color:#000" onclick="sg(true)">I got it right ✓</button><button class="bn bs" style="border-color:var(--no);color:var(--no)" onclick="sg(false)">I got it wrong ✗</button></div>';};
window.sg=function(ok){ok?sc++:wr++;ua[ua.length-1].ok=ok;document.getElementById('nr').innerHTML='<div class="br"><button class="bn bp" onclick="nxt()">Next Question →</button></div>';};
window.nxt=function(){ci++;ans=false;render();};
window.sM=function(m){mode=m;init();render();};
function renderR(){const tot=qs.length,pct=Math.round(sc/tot*100);let g=pct>=90?'🏆 Excellent!':pct>=70?'👏 Good Job!':pct>=50?'📚 Keep Studying':'💪 Try Again';
let rv=ua.map((a,i)=>{if(a.t==='short'){const mk=a.ok?'<span class="g">✓ Self-marked correct</span>':'<span class="r">✗ Self-marked incorrect</span>';return `<div class="ri"><div class="rq">${i+1}. ${a.q}</div><div class="ra">${mk}<br><strong>Your answer:</strong> ${a.u}<br><strong>Model:</strong> ${a.md}</div></div>`;}
const mk=a.ok?`<span class="g">✓ ${a.u}</span>`:`<span class="r">✗ ${a.u}</span> → <span class="g">${a.c}</span>`;return `<div class="ri"><div class="rq">${i+1}. ${a.q}</div><div class="ra">${mk}</div></div>`;}).join('');
document.getElementById('app').innerHTML=`<div class="hd"><h1>Chapter 11 Quiz</h1><p>Legal Issues & Ethics</p></div>
<div class="cd rc2"><h2>${g}</h2><div class="big">${pct}%</div><div class="rd">You got <strong style="color:var(--ok)">${sc}</strong> out of <strong>${tot}</strong> correct<br><span style="color:var(--ok)">● ${sc} correct</span>&nbsp;&nbsp;<span style="color:var(--no)">● ${wr} wrong</span></div><div class="br" style="justify-content:center"><button class="bn bp" onclick="sM('${mode}')">🔄 Retry Quiz</button><button class="bn bs" onclick="sM('all')">📋 All Questions</button></div></div>
<div class="cd" style="padding:18px 22px"><h3 style="margin-bottom:10px;font-size:1rem">📝 Review Answers</h3>${rv}</div>`;}
init();render();
</script>
</body>
